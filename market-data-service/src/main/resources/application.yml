spring:
  application:
    name: market-data-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  mongodb:
    # Spring Boot 4 binds MongoDB connection settings from spring.mongodb.*.
    # Keep accepting the legacy SPRING_DATA_MONGODB_URI env var while preferring
    # SPRING_MONGODB_URI for new deployments.
    uri: ${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/market_db}}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      properties:
        spring.json.add.type.headers: true

app:
  internal:
    # Shared secret gating /api/internal/** endpoints (Golden-State seeder).
    # Injected at runtime via the Lambda INTERNAL_API_KEY env var; blank in local dev
    # unless explicitly exported, in which case the InternalApiKeyFilter fails closed with 503.
    api-key: ${INTERNAL_API_KEY:}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    org.springframework.kafka: INFO
  # Optional: include MDC keys from refresh / startup hydration in console output
  # pattern:
  #   console: "%d{ISO8601} [%thread] [%X{marketDataRefreshJobId}] [%X{marketDataStartupHydrationId}] %-5level %logger - %msg%n"

market:
  seed:
    enabled: true
    fixture-path: classpath:fixtures/market-seed-data.json
  baseline:
    tickers:
      # US (~26)
      - AAPL
      - MSFT
      - GOOG
      - GOOGL
      - AMZN
      - META
      - NVDA
      - TSLA
      - NFLX
      - AMD
      - INTC
      - AVGO
      - QCOM
      - CRM
      - ORCL
      - IBM
      - CSCO
      - JPM
      - BAC
      - WMT
      - PG
      - JNJ
      - XOM
      - CVX
      - V
      - MA
      # India NSE (~17)
      - RELIANCE.NS
      - TCS.NS
      - HDFCBANK.NS
      - INFY.NS
      - ICICIBANK.NS
      - BHARTIARTL.NS
      - SBIN.NS
      - KOTAKBANK.NS
      - LT.NS
      - ITC.NS
      - HINDUNILVR.NS
      - ASIANPAINT.NS
      - MARUTI.NS
      - AXISBANK.NS
      - SUNPHARMA.NS
      - WIPRO.NS
      - ONGC.NS
      # Crypto (~6)
      - BTC-USD
      - ETH-USD
      - SOL-USD
      - DOGE-USD
      - XRP-USD
      - ADA-USD
      # FX (~6)
      - EURUSD=X
      - USDINR=X
      - GBPUSD=X
      - USDJPY=X
      - AUDUSD=X
      - USDCAD=X

market-data:
  refresh:
    enabled: true
    cron: "0 0 */1 * * *" # every 1 hour (Spring 6-field: sec min hour dom month dow)
  hydration:
    enabled: true
  baseline-seed:
    enabled: true

external-market-data:
  provider: yahoo
  base-url: https://query1.finance.yahoo.com
  timeout-ms: 5000
  max-retries: 3
  backoff-ms: 500
  batch-size: 50

resilience4j:
  retry:
    instances:
      externalMarketData:
        maxAttempts: 3
        waitDuration: 5s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$TooManyRequests
          - org.springframework.web.reactive.function.client.WebClientResponseException$InternalServerError
          - java.util.concurrent.TimeoutException
          - java.io.IOException
        ignoreExceptions:
          - org.springframework.web.reactive.function.client.WebClientResponseException$BadRequest
          - org.springframework.web.reactive.function.client.WebClientResponseException$NotFound
          - org.springframework.web.reactive.function.client.WebClientResponseException$Forbidden
          - org.springframework.web.reactive.function.client.WebClientResponseException$Unauthorized
