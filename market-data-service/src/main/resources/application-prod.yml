# ============================================================
# Production profile — cloud-agnostic.
# Active whenever SPRING_PROFILES_ACTIVE includes "prod".
# Loaded before any cloud-specific profile (aws, azure, gcp).
# Cloud profiles override individual keys here as needed.
# ============================================================

server:
  port: 8080

spring:
  data:
    mongodb:
      # Terraform injects SPRING_DATA_MONGODB_URI into the Lambda environment.
      # Docker Compose uses SPRING_DATA_MONGODB_URI (base application.yml) for local dev.
      uri: ${SPRING_DATA_MONGODB_URI}
      # Fail fast on Lambda — 30s default server selection timeout exceeds LWA async-init window.
      auto-index-creation: false
  # Short server selection timeout so MongoDB failures fail fast rather than hanging 30s.
  # Spring Data MongoDB maps spring.data.mongodb.uri but server-selection-timeout requires
  # a MongoClientSettingsBuilderCustomizer bean (see MongoConfig if needed).


  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    ssl:
      trust-store-location: classpath:kafka-truststore.jks
      trust-store-password: ${KAFKA_TRUSTSTORE_PASSWORD:changeit}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username='${KAFKA_SASL_USERNAME}' password='${KAFKA_SASL_PASSWORD}';
    admin:
      # Fail fast on connectivity probe — avoids 30 s hang when broker is unreachable.
      properties:
        request.timeout.ms: 5000

market-data:
  refresh:
    enabled: true
  hydration:
    enabled: true
  baseline-seed:
    enabled: true
