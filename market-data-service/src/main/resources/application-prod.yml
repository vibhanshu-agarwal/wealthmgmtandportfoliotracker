spring:
  application:
    name: market-data-service

  data:
    mongodb:
      # Same env key Terraform sets on the market-data Lambda (SPRING_DATA_MONGODB_URI).
      uri: ${SPRING_DATA_MONGODB_URI}

  # Relational database (e.g. Neon PostgreSQL) – configured via environment
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username='${KAFKA_SASL_USERNAME}' password='${KAFKA_SASL_PASSWORD}';

server:
  port: 8080

market-data:
  refresh:
    enabled: true
  hydration:
    enabled: true
  baseline-seed:
    enabled: true

