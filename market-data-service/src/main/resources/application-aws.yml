# ============================================================
# AWS profile — overrides for Lambda / AWS-specific deployment.
# Active when SPRING_PROFILES_ACTIVE includes "aws" (e.g. "prod,aws").
# Loaded after application-prod.yml; keys here win over prod.
#
# Future clouds: add application-azure.yml / application-gcp.yml
# with their own overrides. application-prod.yml stays untouched.
# ============================================================

# Lambda cold-start optimisations: disable expensive startup work that is
# unnecessary on short-lived serverless instances.
market:
  seed:
    enabled: false

market-data:
  # Scheduled refresh disabled — Lambda is not long-lived enough for cron jobs.
  # Override to true in application-azure.yml if deploying to a container/VM.
  refresh:
    enabled: false
  hydration:
    enabled: true
  baseline-seed:
    enabled: false

management:
  health:
    # Keep the Mongo health contributor enabled, but use our custom
    # mongoHealthIndicator bean. It runs `{ ping: 1 }` against the configured
    # market database instead of the default check that Atlas evaluates against
    # `local` and rejects with AtlasError 8000 for scoped app users.
    mongodb:
      enabled: true
