# ============================================================
# AWS profile — overrides for Lambda / AWS-specific deployment.
# Active when SPRING_PROFILES_ACTIVE includes "aws" (e.g. "prod,aws").
# Loaded after application-prod.yml; keys here win over prod.
#
# Future clouds: add application-azure.yml / application-gcp.yml
# with their own overrides. application-prod.yml stays untouched.
# ============================================================

# Lambda cold-start optimisations: disable expensive startup work that is
# unnecessary on short-lived serverless instances.
market:
  seed:
    enabled: false

market-data:
  # Scheduled refresh disabled — Lambda is not long-lived enough for cron jobs.
  # Override to true in application-azure.yml if deploying to a container/VM.
  refresh:
    enabled: false
  hydration:
    enabled: true
  baseline-seed:
    enabled: false

management:
  health:
    # Exclude MongoDB from the health check on Lambda — a cold MongoDB connection
    # attempt blocks for 30s (server selection timeout) and causes LWA to mark
    # the app as not ready. MongoDB connectivity is verified by actual requests.
    mongo:
      enabled: false

spring:
  autoconfigure:
    exclude:
      # MongoHealthIndicator is @ConditionalOnEnabledHealthIndicator("mongo") which is
      # evaluated at AOT build time — management.health.mongo.enabled=false is ignored.
      # Excluding the auto-configuration class at runtime bypasses the AOT condition.
      - org.springframework.boot.mongodb.health.MongoHealthIndicatorAutoConfiguration
