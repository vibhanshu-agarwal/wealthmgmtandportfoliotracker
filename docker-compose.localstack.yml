# LocalStack overlay for local AWS emulation (Lambda, S3, DynamoDB, CloudFront, IAM, ACM,
# Route53, RDS, ElastiCache, SQS). Use alongside docker-compose.yml; the base compose stack
# handles the application services themselves.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.localstack.yml up -d
#
# AI inference is NOT provided here: local dev defaults to MockAiInsightService /
# MockInsightAdvisor (profile `local`). To smoke-test real Bedrock from a local container,
# export SPRING_PROFILES_ACTIVE=local,bedrock + AWS_* credentials before `docker compose up`
# (see docker-compose.yml for the insight-service environment block).
services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN:?Set LOCALSTACK_AUTH_TOKEN in your shell or .env file}
      SERVICES: lambda,s3,dynamodb,cloudfront,iam,acm,route53,rds,elasticache,sqs
      DEFAULT_REGION: us-east-1
      LAMBDA_EXECUTOR: local
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - wealthmgmt_network

  insight-service:
    build:
      context: ./insight-service
    container_name: insight-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8081
    ports:
      - "8083:8083"
    networks:
      - wealthmgmt_network

networks:
  wealthmgmt_network:
    driver: bridge

