# =============================================================================
# Shared Kafka production configuration fragment.
# Imported by all three backend services via:
#   spring.config.import: "classpath:config/application-prod-kafka.yml"
#
# common-dto is on every service's compile classpath (see each service's
# build.gradle), so this fragment is available at runtime without any
# additional Gradle wiring.
# =============================================================================

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    ssl:
      trust-store-location: ${KAFKA_TRUSTSTORE_PATH:classpath:kafka-truststore.jks}
      trust-store-password: ${KAFKA_TRUSTSTORE_PASSWORD:changeit}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: >
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username='${KAFKA_SASL_USERNAME}' password='${KAFKA_SASL_PASSWORD}';
    admin:
      # auto-create: true tells KafkaAdmin to call CreateTopics for every NewTopic bean
      # it finds in the context. The broker silently ignores the request when the topic
      # already exists, making this idempotent across restarts.
      auto-create: true
      properties:
        # 30 s gives a cold Aiven broker enough time to respond to CreateTopics.
        # The health probe (InfrastructureHealthLogger) uses a separate admin call and
        # is not affected by this timeout — it catches the exception and logs INFRA-FAIL.
        request.timeout.ms: 30000
