spring:
  application:
    name: wealth-management-app

  # Datasource is intentionally absent here.
  # Spring Boot's Docker Compose integration (spring-boot-docker-compose) reads compose.yaml
  # at startup and injects the datasource URL, username, and password automatically
  # via a @ServiceConnection — no hardcoded credentials needed.

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  modulith:
    events:
      jdbc:
        # Instructs the JDBC Event Publication Registry to auto-create the
        # `event_publication` table on startup — the backing store for the Outbox Pattern.
        schema-initialization:
          enabled: true

logging:
  level:
    org.flywaydb: DEBUG
