name: Java CI with Gradle and Spring Modulith

# NOTE: This workflow is superseded by ci-verification.yml for the full
# verification pipeline (Docker build + Pact + Playwright). It is retained
# for backward compatibility and runs the same unit + integration tests.
# If you want to consolidate, you can disable this workflow and rely solely
# on ci-verification.yml which includes these same test stages.

on:
  push:
    branches: [ "main", "architecture/**" ]
  pull_request:
    branches: [ "main", "architecture/**" ]

jobs:
  # Fast path: unit tests only, MockPortfolioAdvisor, no LLM required
  unit-tests:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: default

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            if ./gradlew --version; then
              exit 0
            fi
            echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Gradle wrapper bootstrap failed after 6 attempts."
          ./gradlew --version
          exit 1

      - name: Run Unit Tests (Mock AI Advisor)
        run: ./gradlew test --no-daemon

      - name: Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/reports/tests/'

  # Integration tests with real infrastructure (Postgres, Kafka via Testcontainers)
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio_db
          POSTGRES_USER: wealth_user
          POSTGRES_PASSWORD: wealth_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wealth_user -d portfolio_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            if ./gradlew --version; then
              exit 0
            fi
            echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Gradle wrapper bootstrap failed after 6 attempts."
          ./gradlew --version
          exit 1

      - name: Run Integration Tests
        env:
          SPRING_PROFILES_ACTIVE: default
        run: ./gradlew integrationTest --no-daemon

      - name: Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/build/reports/tests/'
