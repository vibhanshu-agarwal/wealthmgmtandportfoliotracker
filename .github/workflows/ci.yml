name: Java CI with Gradle and Spring Modulith

on:
  push:
    branches: [ "main", "architecture/**" ]
  pull_request:
    branches: [ "main", "architecture/**" ]

permissions:
  id-token: write
  contents: read

jobs:
  # Fast path: unit tests only, MockPortfolioAdvisor, no LLM required
  unit-tests:
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: default

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Unit Tests (Mock AI Advisor)
        run: ./gradlew test --no-daemon

      - name: Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: '**/build/reports/tests/'

  # Integration tests with real infrastructure (Postgres, Kafka via Testcontainers)
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio_db
          POSTGRES_USER: wealth_user
          POSTGRES_PASSWORD: wealth_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U wealth_user -d portfolio_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      localstack:
        image: localstack/localstack:latest
        env:
          SERVICES: s3,sqs,dynamodb
          DEFAULT_REGION: us-east-1
        ports:
          - 4566:4566

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: gradle

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run Integration Tests
        env:
          SPRING_PROFILES_ACTIVE: default
        run: ./gradlew integrationTest --no-daemon

      - name: Upload Test Results on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: '**/build/reports/tests/'
