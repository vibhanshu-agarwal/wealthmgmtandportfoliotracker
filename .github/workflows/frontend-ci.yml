name: Frontend CI (Next.js)

on:
  push:
    branches: [ "main", "architecture/**" ]
  pull_request:
    branches: [ "main", "architecture/**" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      # NextAuth requires NEXTAUTH_SECRET at build time and test time.
      # AUTH_JWT_SECRET must match the value used by the API Gateway.
      # These are non-sensitive placeholder values safe for CI — real secrets
      # are injected via GitHub Secrets in production deployments.
      NEXTAUTH_SECRET: ci-nextauth-secret-not-for-production
      AUTH_JWT_SECRET: ci-jwt-secret-placeholder-min-32-chars!!

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm' # Speeds up builds by caching dependencies
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint

    - name: Check TypeScript Types
      run: npx tsc --noEmit

    - name: Build Next.js Application
      run: npm run build
