name: Frontend CI (Next.js)

on:
  push:
    branches: [ "main", "architecture/**" ]
  pull_request:
    branches: [ "main", "architecture/**" ]

jobs:
  # ── Job 1: Lint, type-check, unit tests, static export build ────────────────────
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    env:
      BETTER_AUTH_SECRET: ci-dummy-jwt-secret-placeholder-min-32-chars!!
      BETTER_AUTH_URL: http://localhost:3000
      AUTH_JWT_SECRET: ci-jwt-secret-placeholder-min-32-chars!!
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check TypeScript Types
        run: npx tsc --noEmit

      - name: Run Unit Tests (Vitest)
        run: npm run test

      - name: Build Next.js Application (static export)
        run: npm run build

      - name: Upload static export artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-static-export
          retention-days: 1
          path: |
            frontend/out

  # ── Job 2: E2E smoke — static export HTTP only (no API Gateway) ───────────────
  # Runs the Playwright `static-smoke` project: verifies the exported bundle is
  # served and the login route returns HTML. Gateway login, JWT alignment, and
  # portfolio API behaviour are asserted only in frontend-e2e-integration.yml
  # (Docker Compose + real /api/auth/login), not here — minting a local JWT to
  # mimic gateway auth would hide real connection and auth failures.
  e2e-smoke:
    runs-on: ubuntu-latest
    needs: build-and-test

    defaults:
      run:
        working-directory: ./frontend
    env:
      # Playwright globalSetup skips waiting on :8080 — this job never starts the gateway.
      SKIP_BACKEND_HEALTH_CHECK: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Download static export artifact
        uses: actions/download-artifact@v4
        with:
          name: next-static-export
          path: frontend/

      - name: Install Playwright browsers (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke tests (static export only)
        run: npx playwright test --project=static-smoke --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          retention-days: 7
          path: frontend/playwright-report/
