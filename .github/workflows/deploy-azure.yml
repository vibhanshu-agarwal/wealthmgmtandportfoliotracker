# Azure Container Apps Deployment Workflow
#
# Builds each backend service image from its Dockerfile.azure, pushes to Azure Container
# Registry (ACR), and rolls out the new revision to the corresponding Azure Container App.
# A separate job builds the Next.js static export and deploys it to Azure Static Web Apps.
# Authentication uses OIDC (Workload Identity Federation) — no client secret is stored.
#
# Required GitHub Actions secrets (repo-level):
#   AZURE_CLIENT_ID        — App Registration / Managed Identity client ID
#   AZURE_TENANT_ID        — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#   SWA_DEPLOYMENT_TOKEN   — Azure Static Web Apps deployment token (from Terraform output or portal)
#
# Resource names are aligned with the Terraform root in infrastructure/terraform/azure/
# (task 11.3): resource group "wealth-azure-prod-rg", ACR "wealthprodacr",
# ACA environment "wealth-prod-aca-env".

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "api-gateway/**"
      - "portfolio-service/**"
      - "market-data-service/**"
      - "insight-service/**"
      - "common-dto/**"
      - "frontend/**"
      - ".github/workflows/deploy-azure.yml"

env:
  AZURE_RG: wealth-azure-prod-rg
  ACR_NAME: wealthprodacr
  ACA_ENV: wealth-prod-aca-env

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - portfolio-service
          - market-data-service
          - insight-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            --pull \
            -f ${{ matrix.service }}/Dockerfile.azure \
            -t $ACR_NAME.azurecr.io/${{ matrix.service }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push $ACR_NAME.azurecr.io/${{ matrix.service }}:${{ github.sha }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ matrix.service }} \
            --resource-group $AZURE_RG \
            --image $ACR_NAME.azurecr.io/${{ matrix.service }}:${{ github.sha }}

      - name: Wait for revision to reach Succeeded state
        # G18 — initial sleep gives ACA internal DNS time to propagate the new revision
        # before the first poll. Polls every 30 s for up to ~10 minutes (20 iterations).
        run: |
          echo "Sleeping 30s for ACA internal DNS propagation (G18)..."
          sleep 30

          MAX_ITERATIONS=20
          SLEEP_SECONDS=30
          iteration=0

          while [ $iteration -lt $MAX_ITERATIONS ]; do
            STATE=$(az containerapp show \
              --name ${{ matrix.service }} \
              --resource-group $AZURE_RG \
              --query properties.provisioningState \
              --output tsv)

            echo "Iteration $((iteration + 1))/$MAX_ITERATIONS — provisioningState: $STATE"

            if [ "$STATE" = "Succeeded" ]; then
              echo "Container App ${{ matrix.service }} reached Succeeded state."
              exit 0
            fi

            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
              echo "Container App ${{ matrix.service }} reached terminal failure state: $STATE"
              exit 1
            fi

            # Still InProgress / Provisioning — keep polling
            iteration=$((iteration + 1))
            if [ $iteration -lt $MAX_ITERATIONS ]; then
              echo "Waiting ${SLEEP_SECONDS}s before next poll..."
              sleep $SLEEP_SECONDS
            fi
          done

          echo "Timed out after $((MAX_ITERATIONS * SLEEP_SECONDS + 30))s waiting for ${{ matrix.service }} to reach Succeeded state. Last state: $STATE"
          exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    # Run after backend services are deployed so the API gateway FQDN is stable.
    # If backend deploy fails, frontend deploy is still attempted (it's independent).
    needs: deploy
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve API Gateway FQDN
        id: api_fqdn
        # Fetch the external FQDN of the api-gateway Container App from Azure.
        # This is the value injected as NEXT_PUBLIC_API_BASE_URL so the static
        # export knows where to send API calls at build time.
        run: |
          FQDN=$(az containerapp show \
            --name api-gateway \
            --resource-group $AZURE_RG \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "api_gateway_fqdn=https://${FQDN}" >> "$GITHUB_OUTPUT"
          echo "Resolved API Gateway FQDN: https://${FQDN}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: frontend
        env:
          # Injected at build time so the static export embeds the correct API origin.
          # The Next.js app uses this for all /api/* calls in the Azure deployment.
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.api_fqdn.outputs.api_gateway_fqdn }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # app_location is the directory containing the built output.
          # Next.js static export writes to `out/` by default (output: "export" in next.config.ts).
          app_location: "frontend"
          output_location: "out"
          # No API backend — all API calls go to the ACA api-gateway via NEXT_PUBLIC_API_BASE_URL.
          skip_api_build: true
