# Azure Container Apps Deployment Workflow
#
# Builds each backend service image from its Dockerfile.azure, pushes to Azure Container
# Registry (ACR), and rolls out the new revision to the corresponding Azure Container App.
# A separate job builds the Next.js static export and deploys it to Azure Static Web Apps.
# Authentication uses OIDC (Workload Identity Federation) — no client secret is stored.
#
# Required GitHub Actions secrets (repo-level):
#   AZURE_CLIENT_ID        — App Registration / Managed Identity client ID
#   AZURE_TENANT_ID        — Azure AD tenant ID
#   AZURE_SUBSCRIPTION_ID  — Azure subscription ID
#   SWA_DEPLOYMENT_TOKEN   — Azure Static Web Apps deployment token (from Terraform output or portal)
#
# Resource names are aligned with the Terraform root in infrastructure/terraform/azure/
# (task 11.3): resource group "wealth-azure-prod-rg", ACR "wealthprodacr",
# ACA environment "wealth-prod-aca-env".
#
# Pre-flight guard: a "preflight" job runs first and checks whether the Azure
# infrastructure has been provisioned (resource group + ACR exist). If not, both
# deploy jobs are skipped with a clear message — run terraform-azure.yml apply first.
# This prevents cryptic RP-not-registered errors when the workflow fires before
# Terraform has ever been applied.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "api-gateway/**"
      - "portfolio-service/**"
      - "market-data-service/**"
      - "insight-service/**"
      - "common-dto/**"
      - "frontend/**"
      - ".github/workflows/deploy-azure.yml"

env:
  AZURE_RG: wealth-azure-prod-rg
  ACR_NAME: wealthprodacr
  ACA_ENV: wealth-prod-aca-env

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Pre-flight: verify infrastructure exists before attempting any deployment.
  # Outputs infra_ready=true only when the resource group AND the ACR both exist.
  # Both deploy jobs gate on this output so they skip cleanly on a fresh subscription.
  # Also ensures the five required Azure Resource Providers are registered — this is
  # idempotent and safe to run on every workflow execution.
  # ---------------------------------------------------------------------------
  preflight:
    runs-on: ubuntu-latest
    outputs:
      infra_ready: ${{ steps.check.outputs.infra_ready }}

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify required Resource Providers are registered
        # The CI service principal does not have subscription-scope rights to register
        # Resource Providers. RPs must be pre-registered manually (see runbook Step 5).
        # This step checks each RP and fails fast with a clear remediation message if
        # any are missing — much clearer than the cryptic API-version errors Terraform
        # would otherwise produce.
        run: |
          MISSING=()
          for rp in Microsoft.App Microsoft.OperationalInsights Microsoft.ContainerRegistry Microsoft.CognitiveServices Microsoft.Web; do
            STATE=$(az provider show --namespace "$rp" --query registrationState -o tsv 2>/dev/null || echo "NotRegistered")
            if [ "$STATE" = "Registered" ]; then
              echo "  [OK] $rp"
            else
              echo "  [MISSING] $rp (state: $STATE)"
              MISSING+=("$rp")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo ""
            echo "::error::The following Resource Providers are not registered: ${MISSING[*]}"
            echo "::error::Run this from the Azure CLI (requires Owner/Contributor on the subscription):"
            echo "::error::  for rp in ${MISSING[*]}; do az provider register --namespace \$rp --wait; done"
            echo "::error::See docs/runbooks/AZURE_SECRETS_SETUP.md Step 5 for full instructions."
            exit 1
          fi
          echo "All required Resource Providers are registered."

      - name: Check whether infrastructure has been provisioned
        id: check
        # Checks for the resource group and ACR. Both must exist for infra_ready=true.
        # If either is missing (or the SP lacks read access yet), Terraform apply has
        # not been run — skip deployment with a clear action message.
        # All az commands use || true so this step never hard-fails; only the deploy
        # jobs fail when infra_ready is not 'true'.
        run: |
          RG_EXISTS="false"
          az group show --name "$AZURE_RG" --output none 2>/dev/null && RG_EXISTS="true" || RG_EXISTS="false"

          ACR_EXISTS="false"
          if [ "$RG_EXISTS" = "true" ]; then
            az acr show --name "$ACR_NAME" --resource-group "$AZURE_RG" --output none 2>/dev/null \
              && ACR_EXISTS="true" || ACR_EXISTS="false"
          fi

          if [ "$RG_EXISTS" = "true" ] && [ "$ACR_EXISTS" = "true" ]; then
            echo "infra_ready=true" >> "$GITHUB_OUTPUT"
            echo "Infrastructure is provisioned — proceeding with deployment."
          else
            echo "infra_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Infrastructure is not provisioned yet (RG exists: $RG_EXISTS, ACR exists: $ACR_EXISTS)."
            echo "::warning::Run 'gh workflow run terraform-azure.yml --field action=apply' first, then re-run this workflow."
          fi

  # ---------------------------------------------------------------------------
  # Backend: build and push service images, update Container Apps.
  # Skipped when infra_ready=false (infrastructure not yet provisioned).
  # Fails when preflight itself failed (RP not registered, auth error, etc.).
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.result == 'success' && needs.preflight.outputs.infra_ready == 'true'
    strategy:
      matrix:
        service:
          - api-gateway
          - portfolio-service
          - market-data-service
          - insight-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build \
            --no-cache \
            --pull \
            -f ${{ matrix.service }}/Dockerfile.azure \
            -t $ACR_NAME.azurecr.io/${{ matrix.service }}:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push $ACR_NAME.azurecr.io/${{ matrix.service }}:${{ github.sha }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ matrix.service }} \
            --resource-group $AZURE_RG \
            --image $ACR_NAME.azurecr.io/${{ matrix.service }}:${{ github.sha }}

      - name: Wait for revision to reach Succeeded state
        # G18 — initial sleep gives ACA internal DNS time to propagate the new revision
        # before the first poll. Polls every 30 s for up to ~10 minutes (20 iterations).
        run: |
          echo "Sleeping 30s for ACA internal DNS propagation (G18)..."
          sleep 30

          MAX_ITERATIONS=20
          SLEEP_SECONDS=30
          iteration=0

          while [ $iteration -lt $MAX_ITERATIONS ]; do
            STATE=$(az containerapp show \
              --name ${{ matrix.service }} \
              --resource-group $AZURE_RG \
              --query properties.provisioningState \
              --output tsv)

            echo "Iteration $((iteration + 1))/$MAX_ITERATIONS — provisioningState: $STATE"

            if [ "$STATE" = "Succeeded" ]; then
              echo "Container App ${{ matrix.service }} reached Succeeded state."
              exit 0
            fi

            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Canceled" ]; then
              echo "Container App ${{ matrix.service }} reached terminal failure state: $STATE"
              exit 1
            fi

            # Still InProgress / Provisioning — keep polling
            iteration=$((iteration + 1))
            if [ $iteration -lt $MAX_ITERATIONS ]; then
              echo "Waiting ${SLEEP_SECONDS}s before next poll..."
              sleep $SLEEP_SECONDS
            fi
          done

          echo "Timed out after $((MAX_ITERATIONS * SLEEP_SECONDS + 30))s waiting for ${{ matrix.service }} to reach Succeeded state. Last state: $STATE"
          exit 1

  # ---------------------------------------------------------------------------
  # Frontend: build Next.js static export and deploy to Azure Static Web Apps.
  # Runs after backend deploy (so the api-gateway FQDN is stable), but also
  # skipped when infra_ready=false.
  # ---------------------------------------------------------------------------
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [preflight, deploy]
    if: needs.preflight.result == 'success' && needs.preflight.outputs.infra_ready == 'true' && needs.deploy.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve API Gateway FQDN
        id: api_fqdn
        # Fetch the external FQDN of the api-gateway Container App from Azure.
        # This is the value injected as NEXT_PUBLIC_API_BASE_URL so the static
        # export knows where to send API calls at build time.
        run: |
          FQDN=$(az containerapp show \
            --name api-gateway \
            --resource-group $AZURE_RG \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "api_gateway_fqdn=https://${FQDN}" >> "$GITHUB_OUTPUT"
          echo "Resolved API Gateway FQDN: https://${FQDN}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js static export
        working-directory: frontend
        env:
          # Injected at build time so the static export embeds the correct API origin.
          # The Next.js app uses this for all /api/* calls in the Azure deployment.
          NEXT_PUBLIC_API_BASE_URL: https://api.vibhanshu-ai-portfolio.dev
          # Demo credentials — pre-populates the login form for recruiter demos.
          NEXT_PUBLIC_DEMO_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          NEXT_PUBLIC_DEMO_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          # app_location points to the pre-built output directory.
          # Next.js static export writes to `frontend/out/` (output: "export" in next.config.ts).
          # skip_app_build: true is REQUIRED — without it the SWA action rebuilds from source
          # inside its own Docker container without NEXT_PUBLIC_API_BASE_URL, producing a bundle
          # that falls back to relative /api/* instead of https://api.vibhanshu-ai-portfolio.dev.
          app_location: "frontend/out"
          output_location: ""
          skip_app_build: true
          skip_api_build: true

  # ---------------------------------------------------------------------------
  # Seeding: populate the demo user's portfolio/market/insight data on the live
  # Azure stack. Runs only after backend and frontend both deploy cleanly.
  # Skipped when infra_ready=false (fresh subscription, terraform never applied).
  # ---------------------------------------------------------------------------
  seed:
    runs-on: ubuntu-latest
    needs: [preflight, deploy, deploy-frontend]
    if: >-
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.infra_ready == 'true' &&
      needs.deploy.result == 'success' &&
      needs.deploy-frontend.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Seed live Azure environment (vibhanshu-ai-portfolio.dev)
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.vibhanshu-ai-portfolio.dev
          SKIP_BACKEND_HEALTH_CHECK: "true"
          INTERNAL_API_KEY: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
          E2E_TEST_USER_ID: ${{ secrets.E2E_TEST_USER_ID || '00000000-0000-0000-0000-000000000e2e' }}
        run: npx ts-node --project tests/e2e/tsconfig.e2e-test.json tests/e2e/global-setup.ts

  # ---------------------------------------------------------------------------
  # Verify: post-seed assertion that the demo is actually queryable through the
  # live custom domain. Closes the observability gap (audit §4 P0/P1).
  # Fails the workflow red on any assertion failure.
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    needs: [preflight, seed]
    if: >-
      needs.preflight.result == 'success' &&
      needs.preflight.outputs.infra_ready == 'true' &&
      needs.seed.result == 'success'

    env:
      API_BASE: https://api.vibhanshu-ai-portfolio.dev
      DEMO_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
      DEMO_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify live demo data
        run: bash .github/workflows/scripts/verify-azure-demo.sh
