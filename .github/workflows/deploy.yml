name: Deploy

# Required GitHub Actions secrets (repo-level)
# - AWS_ACCESS_KEY_ID
# - AWS_SECRET_ACCESS_KEY
# - AWS_REGION
# - AWS_ACCOUNT_ID
# - S3_BUCKET_NAME
# - CLOUDFRONT_DISTRIBUTION_ID
# - ECR_REPOSITORY_NAME
# - LAMBDA_FUNCTION_NAME
#
# Notes
# - Lambda environment variables (REDIS_URL, KAFKA_*, SPRING_PROFILES_ACTIVE, service URLs, etc.)
#   are owned exclusively by Terraform and applied via terraform.yml on push to main.
#   This workflow is image-only: it builds and pushes the container image, then calls
#   update-function-code. It does NOT call update-function-configuration.
# - Do not pass AWS_REGION or AWS_DEFAULT_REGION in Lambda "Variables": Lambda reserves them and sets
#   AWS_REGION to the function's region automatically (Spring/AWS SDK pick it up from the runtime).
# - Triggers on both main and architecture/cloud-native-extraction so that work on the feature
#   branch deploys independently and merges to main also trigger a deploy without divergence.

on:
  push:
    branches:
      - main
      - architecture/cloud-native-extraction

jobs:
  # Static export → S3 → CloudFront invalidation (same path browsers hit via CDN).
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Next.js static export emits `frontend/out/` for S3 hosting.
      - name: Build Next.js static export
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          if [ ! -d "frontend/out" ]; then
            echo "Missing frontend/out after npm run build."
            exit 1
          fi
          aws s3 sync ./frontend/out "s3://${{ secrets.S3_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"

  # Container image for wealth-api-gateway Lambda (Spring Cloud Gateway + downstream Function URLs).
  # IMAGE-ONLY: env vars are managed by terraform.yml — this job only updates the function code.
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      # Wrapper is often committed without the Unix +x bit (e.g. from Windows); Ubuntu then rejects ./gradlew.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            if ./gradlew --version; then
              exit 0
            fi
            echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Gradle wrapper bootstrap failed after 6 attempts."
          ./gradlew --version
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -f api-gateway/Dockerfile \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_SHA}" \
            --push .

      - name: Update Lambda function image
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
        run: |
          # Wait until LastUpdateStatus is Successful before attempting update-function-code.
          # Guards against concurrent Terraform applies or prior in-flight updates.
          for attempt in {1..30}; do
            STATUS="$(aws lambda get-function-configuration \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --query 'LastUpdateStatus' \
              --output text)"

            if [ "$STATUS" = "Successful" ]; then
              echo "Lambda update status is Successful; continuing."
              break
            fi

            if [ "$STATUS" = "Failed" ]; then
              echo "Lambda reports Failed status; aborting code update."
              exit 1
            fi

            echo "Lambda update status is '$STATUS' (attempt $attempt/30); waiting 5s..."
            if [ "$attempt" -eq 30 ]; then
              echo "Timed out waiting for Lambda update lock to clear."
              exit 1
            fi
            sleep 5
          done

          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest"
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "$IMAGE_URI"
