# Re-enable after Azure demo by restoring original triggers.

# Deployment Dispatcher
#
# Single entry point for all cloud deployments. Routes to the appropriate
# cloud-specific workflow based on the repository variable `vars.CLOUD_PROVIDER`.
#
# Path filtering: only triggers when backend services, frontend, common-dto,
# or workflow files change. Docs-only pushes do NOT trigger deployment.
#
# Set the repo variable CLOUD_PROVIDER to "azure" or "aws" in:
#   Settings → Secrets and variables → Actions → Variables
#
# Manual dispatch (workflow_dispatch) always runs regardless of path filters.

name: Deploy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Route: log which cloud provider is active and call the correct workflow.
  # If CLOUD_PROVIDER is not set or unrecognized, fail with a clear message.
  # ---------------------------------------------------------------------------
  route:
    runs-on: ubuntu-latest
    outputs:
      provider: ${{ steps.check.outputs.provider }}
    steps:
      - name: Determine cloud provider
        id: check
        run: |
          PROVIDER="${{ vars.CLOUD_PROVIDER }}"
          echo "provider=${PROVIDER}" >> "$GITHUB_OUTPUT"

          if [ -z "$PROVIDER" ]; then
            echo "::error::Repository variable CLOUD_PROVIDER is not set."
            echo "::error::Set it to 'azure' or 'aws' in Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi

          if [ "$PROVIDER" != "azure" ] && [ "$PROVIDER" != "aws" ]; then
            echo "::error::CLOUD_PROVIDER='${PROVIDER}' is not recognized. Expected 'azure' or 'aws'."
            exit 1
          fi

          echo "Cloud provider: ${PROVIDER}"

      - name: Log routing decision
        run: |
          PROVIDER="${{ steps.check.outputs.provider }}"
          if [ "$PROVIDER" = "azure" ]; then
            echo "::notice::Routing to deploy-azure.yml. deploy-aws.yml will NOT run (CLOUD_PROVIDER=${PROVIDER})."
          elif [ "$PROVIDER" = "aws" ]; then
            echo "::notice::Routing to deploy-aws.yml. deploy-azure.yml will NOT run (CLOUD_PROVIDER=${PROVIDER})."
          fi

  deploy-azure:
    needs: route
    if: needs.route.outputs.provider == 'azure'
    uses: ./.github/workflows/deploy-azure.yml
    secrets: inherit

  deploy-aws:
    needs: route
    if: needs.route.outputs.provider == 'aws'
    uses: ./.github/workflows/deploy-aws.yml
    secrets: inherit

  # Log a clear message when the non-active provider is skipped
  skipped-notice:
    needs: route
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report skipped provider
        run: |
          PROVIDER="${{ needs.route.outputs.provider }}"
          if [ "$PROVIDER" = "azure" ]; then
            echo "::warning::deploy-aws.yml was NOT called because CLOUD_PROVIDER=azure. To deploy to AWS, change the repo variable to 'aws'."
          elif [ "$PROVIDER" = "aws" ]; then
            echo "::warning::deploy-azure.yml was NOT called because CLOUD_PROVIDER=aws. To deploy to Azure, change the repo variable to 'azure'."
          fi
