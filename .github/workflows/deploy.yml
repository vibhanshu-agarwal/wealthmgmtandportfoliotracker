name: Deploy

# Required GitHub Actions secrets (repo-level)
# - AWS_ACCESS_KEY_ID
# - AWS_SECRET_ACCESS_KEY
# - AWS_REGION
# - AWS_ACCOUNT_ID
# - S3_BUCKET_NAME
# - ECR_REPOSITORY_NAME
# - LAMBDA_FUNCTION_NAME
#
# Application/runtime secrets (mapped into Lambda environment)
# - SPRING_DATASOURCE_URL
# - SPRING_DATASOURCE_USERNAME
# - SPRING_DATASOURCE_PASSWORD
# - REDIS_URL
# - UPSTASH_REDIS_REST_URL
# - UPSTASH_REDIS_REST_TOKEN
# - KAFKA_BOOTSTRAP_SERVERS
# - KAFKA_SASL_USERNAME
# - KAFKA_SASL_PASSWORD
# - BEDROCK_REGION
# - BEDROCK_MODEL_ID
# - NEXTAUTH_SECRET
# - AUTH_JWT_SECRET
#
# Notes
# - Missing secrets become empty strings in Lambda; verify all values exist before relying on prod behavior.
# - This workflow intentionally targets branch: architecture/cloud-native-extraction.

on:
  push:
    branches:
      - architecture/cloud-native-extraction

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Next.js `output: "standalone"` does not produce dist/build/out — only `.next/` (see frontend/next.config.ts).
      # This step publishes **cacheable static assets** (`_next/static`, `public`) to S3. HTML/SSR/API must be
      # served by the Next container (e.g. frontend-cd / ghcr.io image) or another origin; do not expect a
      # full static site export while Better Auth API routes exist.
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Upload Next.js static assets to S3
        run: |
          if [ ! -d "frontend/.next/static" ]; then
            echo "Missing frontend/.next/static after npm run build."
            exit 1
          fi
          aws s3 sync "frontend/.next/static/" "s3://${{ secrets.S3_BUCKET_NAME }}/_next/static/" --delete
          if [ -d "frontend/public" ]; then
            aws s3 sync "frontend/public/" "s3://${{ secrets.S3_BUCKET_NAME }}/" --delete
          fi

  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      # Wrapper is often committed without the Unix +x bit (e.g. from Windows); Ubuntu then rejects ./gradlew.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build production JAR
        run: ./gradlew bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install jq (Lambda env JSON generation)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -f portfolio-service/Dockerfile \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_SHA}" \
            --push .

      - name: Update Lambda function configuration (runtime secrets)
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_SASL_USERNAME: ${{ secrets.KAFKA_SASL_USERNAME }}
          KAFKA_SASL_PASSWORD: ${{ secrets.KAFKA_SASL_PASSWORD }}
          BEDROCK_REGION: ${{ secrets.BEDROCK_REGION }}
          BEDROCK_MODEL_ID: ${{ secrets.BEDROCK_MODEL_ID }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
        run: |
          jq -n \
            --arg SPRING_PROFILES_ACTIVE "prod,aws" \
            --arg SERVER_PORT "8080" \
            --arg PORT "8080" \
            --arg AWS_LAMBDA_EXEC_WRAPPER "/lambda-adapter" \
            --arg SPRING_DATASOURCE_URL "$SPRING_DATASOURCE_URL" \
            --arg SPRING_DATASOURCE_USERNAME "$SPRING_DATASOURCE_USERNAME" \
            --arg SPRING_DATASOURCE_PASSWORD "$SPRING_DATASOURCE_PASSWORD" \
            --arg REDIS_URL "$REDIS_URL" \
            --arg UPSTASH_REDIS_REST_URL "$UPSTASH_REDIS_REST_URL" \
            --arg UPSTASH_REDIS_REST_TOKEN "$UPSTASH_REDIS_REST_TOKEN" \
            --arg KAFKA_BOOTSTRAP_SERVERS "$KAFKA_BOOTSTRAP_SERVERS" \
            --arg KAFKA_SECURITY_PROTOCOL "SASL_SSL" \
            --arg KAFKA_SASL_MECHANISM "PLAIN" \
            --arg KAFKA_SASL_USERNAME "$KAFKA_SASL_USERNAME" \
            --arg KAFKA_SASL_PASSWORD "$KAFKA_SASL_PASSWORD" \
            --arg BEDROCK_REGION "$BEDROCK_REGION" \
            --arg BEDROCK_MODEL_ID "$BEDROCK_MODEL_ID" \
            --arg NEXTAUTH_SECRET "$NEXTAUTH_SECRET" \
            --arg AUTH_JWT_SECRET "$AUTH_JWT_SECRET" \
            --arg AWS_REGION "$AWS_REGION" \
            --arg AWS_ACCOUNT_ID "$AWS_ACCOUNT_ID" \
            '{
              Variables: {
                SPRING_PROFILES_ACTIVE: $SPRING_PROFILES_ACTIVE,
                SERVER_PORT: $SERVER_PORT,
                PORT: $PORT,
                AWS_LAMBDA_EXEC_WRAPPER: $AWS_LAMBDA_EXEC_WRAPPER,
                SPRING_DATASOURCE_URL: $SPRING_DATASOURCE_URL,
                SPRING_DATASOURCE_USERNAME: $SPRING_DATASOURCE_USERNAME,
                SPRING_DATASOURCE_PASSWORD: $SPRING_DATASOURCE_PASSWORD,
                REDIS_URL: $REDIS_URL,
                UPSTASH_REDIS_REST_URL: $UPSTASH_REDIS_REST_URL,
                UPSTASH_REDIS_REST_TOKEN: $UPSTASH_REDIS_REST_TOKEN,
                KAFKA_BOOTSTRAP_SERVERS: $KAFKA_BOOTSTRAP_SERVERS,
                KAFKA_SECURITY_PROTOCOL: $KAFKA_SECURITY_PROTOCOL,
                KAFKA_SASL_MECHANISM: $KAFKA_SASL_MECHANISM,
                KAFKA_SASL_USERNAME: $KAFKA_SASL_USERNAME,
                KAFKA_SASL_PASSWORD: $KAFKA_SASL_PASSWORD,
                BEDROCK_REGION: $BEDROCK_REGION,
                BEDROCK_MODEL_ID: $BEDROCK_MODEL_ID,
                NEXTAUTH_SECRET: $NEXTAUTH_SECRET,
                AUTH_JWT_SECRET: $AUTH_JWT_SECRET,
                AWS_REGION: $AWS_REGION,
                AWS_ACCOUNT_ID: $AWS_ACCOUNT_ID
              }
            }' > lambda-env.json

          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --environment "file://lambda-env.json"

      - name: Update Lambda function image
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG_SHA}"
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "$IMAGE_URI"
