name: Deploy

# Required GitHub Actions secrets (repo-level)
# - AWS_ACCESS_KEY_ID
# - AWS_SECRET_ACCESS_KEY
# - AWS_REGION
# - AWS_ACCOUNT_ID
# - S3_BUCKET_NAME
# - CLOUDFRONT_DISTRIBUTION_ID
# - ECR_REPOSITORY_NAME
# - LAMBDA_FUNCTION_NAME
#
# Application/runtime secrets (mapped into api-gateway Lambda environment)
# - PORTFOLIO_SERVICE_URL
# - MARKET_DATA_SERVICE_URL
# - INSIGHT_SERVICE_URL
# - AUTH_JWK_URI
# - CLOUDFRONT_ORIGIN_SECRET
#
# Notes
# - Missing secrets become empty strings in Lambda; verify all values exist before relying on prod behavior.
# - Do not pass AWS_REGION or AWS_DEFAULT_REGION in Lambda "Variables": Lambda reserves them and sets
#   AWS_REGION to the function's region automatically (Spring/AWS SDK pick it up from the runtime).
# - This workflow intentionally targets branch: architecture/cloud-native-extraction.

on:
  push:
    branches:
      - architecture/cloud-native-extraction

jobs:
  # Static export → S3 → CloudFront invalidation (same path browsers hit via CDN).
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Next.js static export emits `frontend/out/` for S3 hosting.
      - name: Build Next.js static export
        working-directory: ./frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync to S3
        run: |
          if [ ! -d "frontend/out" ]; then
            echo "Missing frontend/out after npm run build."
            exit 1
          fi
          aws s3 sync ./frontend/out "s3://${{ secrets.S3_BUCKET_NAME }}" --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"

  # Container image for wealth-api-gateway Lambda (Spring Cloud Gateway + downstream Function URLs).
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      # Wrapper is often committed without the Unix +x bit (e.g. from Windows); Ubuntu then rejects ./gradlew.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            if ./gradlew --version; then
              exit 0
            fi
            echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Gradle wrapper bootstrap failed after 6 attempts."
          ./gradlew --version
          exit 1

      - name: Build api-gateway production JAR
        run: ./gradlew :api-gateway:bootJar

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install jq (Lambda env JSON generation)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG_SHA: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -f api-gateway/Dockerfile \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest" \
            -t "${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG_SHA}" \
            --push .

      - name: Update Lambda function configuration (api-gateway runtime)
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          PORTFOLIO_SERVICE_URL: ${{ secrets.PORTFOLIO_SERVICE_URL }}
          MARKET_DATA_SERVICE_URL: ${{ secrets.MARKET_DATA_SERVICE_URL }}
          INSIGHT_SERVICE_URL: ${{ secrets.INSIGHT_SERVICE_URL }}
          AUTH_JWK_URI: ${{ secrets.AUTH_JWK_URI }}
          CLOUDFRONT_ORIGIN_SECRET: ${{ secrets.CLOUDFRONT_ORIGIN_SECRET }}
        run: |
          jq -n \
            --arg SPRING_PROFILES_ACTIVE "prod,aws" \
            --arg SERVER_PORT "8080" \
            --arg PORT "8080" \
            --arg JAVA_TOOL_OPTIONS "-XX:+TieredCompilation -XX:TieredStopAtLevel=1" \
            --arg PORTFOLIO_SERVICE_URL "$PORTFOLIO_SERVICE_URL" \
            --arg MARKET_DATA_SERVICE_URL "$MARKET_DATA_SERVICE_URL" \
            --arg INSIGHT_SERVICE_URL "$INSIGHT_SERVICE_URL" \
            --arg AUTH_JWK_URI "$AUTH_JWK_URI" \
            --arg CLOUDFRONT_ORIGIN_SECRET "$CLOUDFRONT_ORIGIN_SECRET" \
            --arg AWS_LWA_ASYNC_INIT "true" \
            --arg AWS_LWA_READINESS_CHECK_PATH "/actuator/health" \
            '{
              Variables: {
                SPRING_PROFILES_ACTIVE: $SPRING_PROFILES_ACTIVE,
                SERVER_PORT: $SERVER_PORT,
                PORT: $PORT,
                JAVA_TOOL_OPTIONS: $JAVA_TOOL_OPTIONS,
                PORTFOLIO_SERVICE_URL: $PORTFOLIO_SERVICE_URL,
                MARKET_DATA_SERVICE_URL: $MARKET_DATA_SERVICE_URL,
                INSIGHT_SERVICE_URL: $INSIGHT_SERVICE_URL,
                AUTH_JWK_URI: $AUTH_JWK_URI,
                CLOUDFRONT_ORIGIN_SECRET: $CLOUDFRONT_ORIGIN_SECRET,
                AWS_LWA_ASYNC_INIT: $AWS_LWA_ASYNC_INIT,
                AWS_LWA_READINESS_CHECK_PATH: $AWS_LWA_READINESS_CHECK_PATH
              }
            }' > lambda-env.json

          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --environment "file://lambda-env.json"

      - name: Update Lambda function image
        env:
          LAMBDA_FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
        run: |
          # Lambda rejects code updates while a prior configuration update is still in progress.
          # Wait until LastUpdateStatus is Successful before attempting update-function-code.
          for attempt in {1..30}; do
            STATUS="$(aws lambda get-function-configuration \
              --function-name "$LAMBDA_FUNCTION_NAME" \
              --query 'LastUpdateStatus' \
              --output text)"

            if [ "$STATUS" = "Successful" ]; then
              echo "Lambda update status is Successful; continuing."
              break
            fi

            if [ "$STATUS" = "Failed" ]; then
              echo "Lambda reports Failed status; aborting code update."
              exit 1
            fi

            echo "Lambda update status is '$STATUS' (attempt $attempt/30); waiting 5s..."
            if [ "$attempt" -eq 30 ]; then
              echo "Timed out waiting for Lambda update lock to clear."
              exit 1
            fi
            sleep 5
          done

          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest"
          aws lambda update-function-code \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --image-uri "$IMAGE_URI"
