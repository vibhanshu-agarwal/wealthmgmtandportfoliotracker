name: Continuous Deployment (Publish Docker Image)

# NOTE: This workflow is superseded by ci-verification.yml for image publishing.
# The new pipeline builds multi-stage Docker images, runs the full verification
# suite (Pact + Playwright), and publishes per-service images to GHCR.
# This workflow is retained for reference but can be disabled once
# ci-verification.yml is validated in production.

# This pipeline only runs AFTER code is successfully merged to main
on:
  push:
    branches: [ "main" ]

# Define permissions needed to push to GitHub's Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
      run: |
        set -e
        for attempt in 1 2 3 4 5 6; do
          if ./gradlew --version; then
            exit 0
          fi
          echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
          sleep $((attempt * 15))
        done
        echo "Gradle wrapper bootstrap failed after 6 attempts."
        ./gradlew --version
        exit 1

    - name: Log in to the GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and Push Docker Image via Spring Boot Buildpacks
      # This command compiles the code, builds the optimized Docker image, 
      # tags it with the GitHub run number, and pushes it to GHCR.
      run: |
        ./gradlew bootBuildImage \
          --imageName=ghcr.io/${{ github.repository }}/wealth-management-app:${{ github.run_number }} \
          --publishImage
