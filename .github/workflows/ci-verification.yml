name: CI Verification Pipeline

on:
  push:
    branches: ["main", "architecture/**"]
  pull_request:
    branches: ["main", "architecture/**"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Unit tests (fast, no infrastructure)
  # ──────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            if ./gradlew --version; then
              exit 0
            fi
            echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Gradle wrapper bootstrap failed after 6 attempts."
          ./gradlew --version
          exit 1

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "**/build/reports/tests/"

  # ──────────────────────────────────────────────
  # Job 2: Integration tests (Testcontainers)
  # ──────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            if ./gradlew --version; then
              exit 0
            fi
            echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Gradle wrapper bootstrap failed after 6 attempts."
          ./gradlew --version
          exit 1

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: "**/build/reports/tests/"

  # ──────────────────────────────────────────────
  # Job 3: Pact consumer contract tests (frontend)
  # ──────────────────────────────────────────────
  pact-consumer:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Pact consumer tests
        working-directory: frontend
        run: npm run test:pact

      - name: Upload Pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: frontend/pacts/
          retention-days: 5

  # ──────────────────────────────────────────────
  # Job 4: Docker build, Pact provider verification,
  #         Playwright E2E, and publish to GHCR
  # ──────────────────────────────────────────────
  docker-build-verify:
    runs-on: ubuntu-latest
    needs: pact-consumer
    env:
      # Keep gateway JWT validation and frontend token minting aligned (non-empty secret required to sign tokens).
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET || 'local-dev-secret-change-me-min-32-chars' }}
      BETTER_AUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      BETTER_AUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://wealth_user:wealth_pass@localhost:5432/portfolio_db
      # docker-compose.yml prefers Terraform-style interpolation, while Playwright
      # global-setup reads INTERNAL_API_KEY. Export both from the same GitHub secret.
      TF_VAR_internal_api_key: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
      INTERNAL_API_KEY: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Download Pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: frontend/pacts/

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle wrapper (retry on services.gradle.org flake)
        run: |
          set -e
          for attempt in 1 2 3 4 5 6; do
            if ./gradlew --version; then
              exit 0
            fi
            echo "Gradle wrapper download attempt $attempt failed; sleeping $((attempt * 15))s..."
            sleep $((attempt * 15))
          done
          echo "Gradle wrapper bootstrap failed after 6 attempts."
          ./gradlew --version
          exit 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build all service images via Docker Compose ──
      - name: Build Docker images
        run: docker compose build

      # ── Pact provider verification (MockMvc, no running containers needed) ──
      - name: Run Pact provider verification
        run: ./gradlew :portfolio-service:test --tests '*PactVerification*' :insight-service:test --tests '*PactVerification*' --no-daemon

      # ── Start Docker Compose stack and wait for health ──
      - name: Start Docker Compose stack
        run: |
          docker compose up -d
          echo "Waiting for services to become healthy (up to 3 minutes)..."
          for i in $(seq 1 36); do
            sleep 10
            echo "--- Health check attempt $i/36 ---"
            docker compose ps
            # Check if all 4 Java services are healthy
            HEALTHY=$(docker compose ps --format json | grep -c '"healthy"' || true)
            echo "Healthy services: $HEALTHY/4"
            if [ "$HEALTHY" -ge 4 ]; then
              echo "All services healthy!"
              exit 0
            fi
          done
          echo "Services failed to become healthy within 6 minutes"
          docker compose logs
          exit 1

      # ── Playwright E2E ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Auth preflight - JWT health self-check
        working-directory: frontend
        run: npx playwright test tests/e2e/auth-jwt-health.spec.ts --project=chromium --reporter=list

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: |
          npx playwright test \
            tests/e2e/golden-path.spec.ts \
            tests/e2e/dashboard-data.spec.ts \
            tests/e2e/mocked-chaos.spec.ts \
            tests/e2e/live-contract.spec.ts \
            --project=chromium \
            --reporter=list

      - name: Pre-warm AWS Lambda stack
        # Runs against the live site — only on push to main to avoid hammering AWS on every PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Hit gateway-routed health endpoints for every backend Lambda before seeding.
        # Keep this sequential to avoid exhausting the ap-south-1 concurrency quota of 10.
        run: |
          set +e
          BASE="https://vibhanshu-ai-portfolio.dev"
          PATHS=("/actuator/health" "/api/portfolio/health" "/api/market/health" "/api/insights/health")
          echo "Pre-warming Lambda stack at ${BASE} ..."
          for pass in 1 2 3; do
            echo "Warm pass ${pass}/3"
            ALL_WARM=true
            for path in "${PATHS[@]}"; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 55 "${BASE}${path}" || echo "000")
              echo "  ${path}: HTTP ${STATUS}"
              if [ "$STATUS" = "502" ] || [ "$STATUS" = "504" ] || [ "$STATUS" = "000" ]; then
                ALL_WARM=false
              fi
              sleep 2
            done
            if [ "$ALL_WARM" = "true" ]; then
              echo "Lambda stack accepted warm-up requests. Proceeding."
              exit 0
            fi
            echo "  Cold start or timeout still present — waiting 10s before retry..."
            sleep 10
          done
          echo "Warning: Lambda pre-warm still saw 5xx/timeout responses. Seeding may still retry successfully."
      - name: Run AWS synthetic monitoring
        working-directory: frontend
        # Runs against the live site — only on push to main to avoid hammering AWS on every PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          # Target the live production deployment, not the local Docker Compose stack.
          # Without these, global-setup.ts falls back to http://localhost:8080 and seeds
          # the local stack instead of the live AWS environment.
          NEXT_PUBLIC_API_BASE_URL: https://vibhanshu-ai-portfolio.dev
          BASE_URL: https://vibhanshu-ai-portfolio.dev
          # Lambda cold starts exceed the AbortSignal timeout in the health poller and
          # /actuator/health is protected by CloudFront origin-verify. The synthetic
          # tests themselves are the liveness signal for the live environment.
          SKIP_BACKEND_HEALTH_CHECK: "true"
          # INTERNAL_API_KEY is inherited from the job-level env (secrets.TF_VAR_INTERNAL_API_KEY).
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
          E2E_TEST_USER_ID: ${{ secrets.E2E_TEST_USER_ID || '00000000-0000-0000-0000-000000000e2e' }}
        run: |
          npx playwright test \
            tests/e2e/aws-synthetic/api-live-smoke.spec.ts \
            tests/e2e/aws-synthetic/aws-synthetic.spec.ts \
            --project=aws-synthetic \
            --reporter=list

      # ── Failure handling ──
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color > container-logs.txt 2>&1

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: container-logs.txt
          retention-days: 14

      # ── Publish verified images to GHCR ──
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push verified images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG=${{ github.sha }}
          # Docker Compose names images as <project>-<service>
          PROJECT=$(basename $(pwd) | tr '[:upper:]' '[:lower:]')
          for SERVICE in portfolio-service market-data-service insight-service api-gateway; do
            COMPOSE_IMAGE="${PROJECT}-${SERVICE}"
            docker tag ${COMPOSE_IMAGE}:latest ${{ env.IMAGE_PREFIX }}/${SERVICE}:${TAG}
            docker tag ${COMPOSE_IMAGE}:latest ${{ env.IMAGE_PREFIX }}/${SERVICE}:latest
            docker push ${{ env.IMAGE_PREFIX }}/${SERVICE}:${TAG}
            docker push ${{ env.IMAGE_PREFIX }}/${SERVICE}:latest
          done

      # ── Cleanup ──
      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
