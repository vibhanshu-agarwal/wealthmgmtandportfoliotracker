name: CI Verification Pipeline

on:
  push:
    branches: ["main", "architecture/**"]
  pull_request:
    branches: ["main", "architecture/**"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Unit tests (fast, no infrastructure)
  # ──────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: "**/build/reports/tests/"

  # ──────────────────────────────────────────────
  # Job 2: Integration tests (Testcontainers)
  # ──────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: "**/build/reports/tests/"

  # ──────────────────────────────────────────────
  # Job 3: Pact consumer contract tests (frontend)
  # ──────────────────────────────────────────────
  pact-consumer:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Pact consumer tests
        working-directory: frontend
        run: npm run test:pact

      - name: Upload Pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: frontend/pacts/
          retention-days: 5

  # ──────────────────────────────────────────────
  # Job 4: Docker build, Pact provider verification,
  #         Playwright E2E, and publish to GHCR
  # ──────────────────────────────────────────────
  docker-build-verify:
    runs-on: ubuntu-latest
    needs: pact-consumer
    steps:
      - uses: actions/checkout@v4

      - name: Download Pact contracts
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: frontend/pacts/

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Build all service images via Docker Compose ──
      - name: Build Docker images
        run: docker compose build

      # ── Pact provider verification (MockMvc, no running containers needed) ──
      - name: Run Pact provider verification
        run: ./gradlew :portfolio-service:test --tests '*PactVerification*' :insight-service:test --tests '*PactVerification*' --no-daemon

      # ── Start Docker Compose stack and wait for health ──
      - name: Start Docker Compose stack
        run: |
          docker compose up -d
          echo "Waiting for services to become healthy (up to 3 minutes)..."
          for i in $(seq 1 36); do
            sleep 10
            echo "--- Health check attempt $i/36 ---"
            docker compose ps
            # Check if all 4 Java services are healthy
            HEALTHY=$(docker compose ps --format json | grep -c '"healthy"' || true)
            echo "Healthy services: $HEALTHY/4"
            if [ "$HEALTHY" -ge 4 ]; then
              echo "All services healthy!"
              exit 0
            fi
          done
          echo "Services failed to become healthy within 6 minutes"
          docker compose logs
          exit 1

      # ── Playwright E2E ──
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E tests
        working-directory: frontend
        run: npx playwright test

      # ── Failure handling ──
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Dump container logs on failure
        if: failure()
        run: docker compose logs --no-color > container-logs.txt 2>&1

      - name: Upload container logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: container-logs.txt
          retention-days: 14

      # ── Publish verified images to GHCR ──
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push verified images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          TAG=${{ github.sha }}
          # Docker Compose names images as <project>-<service>
          PROJECT=$(basename $(pwd) | tr '[:upper:]' '[:lower:]')
          for SERVICE in portfolio-service market-data-service insight-service api-gateway; do
            COMPOSE_IMAGE="${PROJECT}-${SERVICE}"
            docker tag ${COMPOSE_IMAGE}:latest ${{ env.IMAGE_PREFIX }}/${SERVICE}:${TAG}
            docker tag ${COMPOSE_IMAGE}:latest ${{ env.IMAGE_PREFIX }}/${SERVICE}:latest
            docker push ${{ env.IMAGE_PREFIX }}/${SERVICE}:${TAG}
            docker push ${{ env.IMAGE_PREFIX }}/${SERVICE}:latest
          done

      # ── Cleanup ──
      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v
