name: Terraform Infrastructure

on:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_VAR_postgres_connection_string: ${{ secrets.POSTGRES_CONNECTION_STRING }}
  TF_VAR_mongodb_connection_string: ${{ secrets.MONGODB_CONNECTION_STRING }}
  TF_VAR_auth_jwk_uri: ${{ secrets.AUTH_JWK_URI }}
  TF_VAR_cloudfront_origin_secret: ${{ secrets.CLOUDFRONT_ORIGIN_SECRET }}

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
        env:
          TF_VAR_state_bucket_name: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_lock_table_name: ${{ secrets.TF_LOCK_TABLE }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="state_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -var="lock_table_name=${{ secrets.TF_LOCK_TABLE }}" \
            -var="artifact_bucket_name=${{ secrets.TF_ARTIFACT_BUCKET }}" \
            -var="lambda_adapter_layer_arn=${{ secrets.LAMBDA_ADAPTER_LAYER_ARN }}" \
            -var="s3_key_api_gateway=${{ secrets.S3_KEY_API_GATEWAY }}" \
            -var="s3_key_portfolio=${{ secrets.S3_KEY_PORTFOLIO }}" \
            -var="s3_key_market_data=${{ secrets.S3_KEY_MARKET_DATA }}" \
            -var="s3_key_insight=${{ secrets.S3_KEY_INSIGHT }}" \
            -out=tfplan

      - name: Terraform Show (JSON)
        run: terraform show -json tfplan > plan.json

      - name: Assert Plan (Free Tier + Correctness Properties)
        run: python3 scripts/assert_plan.py plan.json

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            infrastructure/terraform/tfplan
            infrastructure/terraform/plan.json
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infrastructure/terraform

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
