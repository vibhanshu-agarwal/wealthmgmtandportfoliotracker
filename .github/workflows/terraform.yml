name: Terraform Infrastructure

# Serialize runs against the same remote state so concurrent plans do not
# fail on DynamoDB ConditionalCheckFailedException (stale locks if a job is cancelled).
concurrency:
  group: terraform-state-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform.yml'
  push:
    branches:
      - main
    paths:
      - 'infrastructure/terraform/**'

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  # Never block CI on stdin (missing vars look like a "stuck" lock after "Acquiring state lock").
  TF_INPUT: "false"
  TF_VAR_postgres_connection_string: ${{ secrets.POSTGRES_CONNECTION_STRING }}
  TF_VAR_mongodb_connection_string: ${{ secrets.MONGODB_CONNECTION_STRING }}
  TF_VAR_auth_jwk_uri: ${{ secrets.AUTH_JWK_URI }}
  TF_VAR_cloudfront_origin_secret: ${{ secrets.CLOUDFRONT_ORIGIN_SECRET }}
  TF_VAR_db_username: ${{ secrets.RDS_MASTER_USERNAME }}
  TF_VAR_db_password: ${{ secrets.RDS_MASTER_PASSWORD }}
  # Messaging & Caching — runtime secrets now owned by Terraform (not deploy.yml)
  TF_VAR_redis_url: ${{ secrets.REDIS_URL }}
  TF_VAR_kafka_bootstrap_servers: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
  TF_VAR_kafka_sasl_username: ${{ secrets.KAFKA_SASL_USERNAME }}
  TF_VAR_kafka_sasl_password: ${{ secrets.KAFKA_SASL_PASSWORD }}
  # api-gateway Lambda (package_type Image) — align with deploy.yml ECR image
  TF_VAR_api_gateway_image_uri: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY_NAME }}:latest

jobs:
  validate:
    name: Validate & Plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          terraform_wrapper: false

      - name: Terraform Format (check)
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -input=false -lock-timeout=10m \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"
        env:
          TF_VAR_state_bucket_name: ${{ secrets.TF_STATE_BUCKET }}
          TF_VAR_lock_table_name: ${{ secrets.TF_LOCK_TABLE }}

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          terraform plan -input=false -lock-timeout=10m \
            -var="state_bucket_name=${{ secrets.TF_STATE_BUCKET }}" \
            -var="lock_table_name=${{ secrets.TF_LOCK_TABLE }}" \
            -var="artifact_bucket_name=${{ secrets.TF_ARTIFACT_BUCKET }}" \
            -var="frontend_bucket_name=${{ secrets.S3_BUCKET_NAME }}" \
            -var="lambda_adapter_layer_arn=${{ secrets.LAMBDA_ADAPTER_LAYER_ARN }}" \
            -var="s3_key_api_gateway=${{ secrets.S3_KEY_API_GATEWAY }}" \
            -var="s3_key_portfolio=${{ secrets.S3_KEY_PORTFOLIO }}" \
            -var="s3_key_market_data=${{ secrets.S3_KEY_MARKET_DATA }}" \
            -var="s3_key_insight=${{ secrets.S3_KEY_INSIGHT }}" \
            -var="enable_aws_managed_database=false" \
            -out=tfplan

      - name: Terraform Plan (Text)
        run: terraform show tfplan > plan.txt

      - name: Terraform Show (JSON)
        run: terraform show -json tfplan > plan.json

      - name: Assert Plan (Free Tier + Correctness Properties)
        run: python3 scripts/assert_plan.py plan.json

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            infrastructure/terraform/tfplan
            infrastructure/terraform/plan.txt
            infrastructure/terraform/plan.json
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 45
    defaults:
      run:
        working-directory: infrastructure/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.6"
          terraform_wrapper: false

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: infrastructure/terraform

      - name: Terraform Init
        run: |
          terraform init -input=false -lock-timeout=10m \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}"

      - name: Terraform Apply
        run: terraform apply -input=false -lock-timeout=10m -auto-approve tfplan | tee apply.txt

      - name: Upload Apply Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tf-apply
          path: infrastructure/terraform/apply.txt
          retention-days: 7

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID="$(terraform output -raw cloudfront_distribution_id)"
          aws cloudfront create-invalidation \
            --distribution-id "${DISTRIBUTION_ID}" \
            --paths "/*"
