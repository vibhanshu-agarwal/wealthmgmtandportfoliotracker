name: Synthetic Monitoring

on:
  workflow_dispatch:
  schedule:
    # Once daily at 08:00 UTC (13:30 IST). Hourly was the previous cadence but it
    # forced all four Azure Container Apps to scale from 0→1 every hour, which
    # was the dominant driver of the May-2026 cost spike (3-4× budget). Daily is
    # sufficient as a liveness signal for a personal demo; on-demand verification
    # is still available via workflow_dispatch.
    - cron: '0 8 * * *'

jobs:
  run-synthetic-tests:
    name: Run AWS Synthetic Suite
    # Only run when explicitly deploying to AWS
    if: vars.CLOUD_PROVIDER == 'aws'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Pre-warm AWS Lambda stack
        # Hit gateway-routed health endpoints for every backend Lambda before seeding.
        # This keeps the request fan-out below the ap-south-1 account concurrency quota (10)
        # while ensuring the seed request is not the first cold-start trigger.
        run: |
          set +e
          BASE="https://vibhanshu-ai-portfolio.dev"
          PATHS=("/actuator/health" "/api/portfolio/health" "/api/market/health" "/api/insights/health")
          echo "Pre-warming Lambda stack at ${BASE} ..."
          for pass in 1 2 3; do
            echo "Warm pass ${pass}/3"
            ALL_WARM=true
            for path in "${PATHS[@]}"; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 55 "${BASE}${path}" || echo "000")
              echo "  ${path}: HTTP ${STATUS}"
              if [ "$STATUS" = "502" ] || [ "$STATUS" = "504" ] || [ "$STATUS" = "000" ]; then
                ALL_WARM=false
              fi
              sleep 2
            done
            if [ "$ALL_WARM" = "true" ]; then
              echo "Lambda stack accepted warm-up requests. Proceeding."
              exit 0
            fi
            echo "  Cold start or timeout still present — waiting 10s before retry..."
            sleep 10
          done
          echo "Warning: Lambda pre-warm still saw 5xx/timeout responses. Seeding will retry in Playwright."

      - name: Run Synthetic Monitoring
        working-directory: ./frontend
        env:
          # Targets the live production site (CloudFront root domain)
          BASE_URL: https://vibhanshu-ai-portfolio.dev
          # Gateway base URL — API is served under /api/* on the same CloudFront distribution.
          # There is no separate api. subdomain; the backend routes through the root domain.
          NEXT_PUBLIC_API_BASE_URL: https://vibhanshu-ai-portfolio.dev
          # Skip the local-stack health poll — not appropriate for live AWS:
          #   1. Lambda cold starts exceed the 5s AbortSignal in global-setup.
          #   2. /actuator/health is protected by Spring Security (returns 403 through CloudFront).
          # The synthetic tests themselves are the health signal for this environment.
          SKIP_BACKEND_HEALTH_CHECK: "true"
          # Shared secret for seeding
          INTERNAL_API_KEY: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
          # E2E test user credentials
          E2E_TEST_USER_EMAIL: e2e-test-user@vibhanshu-ai-portfolio.dev
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npx playwright test --project=aws-synthetic

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  run-azure-synthetic-tests:
    name: Run Azure Synthetic Suite
    # Only run when explicitly deploying to Azure
    if: vars.CLOUD_PROVIDER == 'azure'
    runs-on: ubuntu-latest
    env:
      # Azure split-domain (post-DNS-cutover): SWA frontend at the apex domain,
      # API gateway at the api. subdomain. Seed + Playwright global-setup must
      # target the gateway host — not the root domain (which serves static UI).
      API_BASE: https://api.vibhanshu-ai-portfolio.dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Pre-warm Azure Container Apps
        # Hit gateway health endpoints (API_BASE) to scale ACA from zero before seed/tests.
        run: |
          set +e
          PATHS=("/actuator/health" "/api/portfolio/health" "/api/market/health" "/api/insights/health")
          echo "Pre-warming Azure Container Apps at ${API_BASE} ..."
          for path in "${PATHS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${API_BASE}${path}" || echo "000")
            echo "  ${path}: HTTP ${STATUS}"
            sleep 1
          done
          echo "Pre-warm complete. Container Apps are ready."

      - name: Refresh seeded demo prices (24h delta)
        # Re-seed portfolio history + market-data Kafka observations so 24h % and AI
        # insight trends reflect today's deterministic delta. Idempotent; ~$0 extra cost
        # on the existing daily 08:00 UTC wake (min_replicas=0).
        env:
          INTERNAL_API_KEY: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
          E2E_USER_ID: "00000000-0000-0000-0000-000000000e2e"
        run: |
          set -euo pipefail
          seed_endpoint() {
            local label="$1"
            local path="$2"
            local body="$3"
            echo "Seeding ${label} via ${API_BASE}${path} ..."
            STATUS=$(curl -sS -o /tmp/seed-response.txt -w "%{http_code}" \
              -X POST "${API_BASE}${path}" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Api-Key: ${INTERNAL_API_KEY}" \
              -d "${body}" \
              --max-time 120 || echo "000")
            echo "  ${label}: HTTP ${STATUS}"
            if [ "${STATUS}" != "200" ]; then
              cat /tmp/seed-response.txt || true
              exit 1
            fi
          }
          seed_endpoint "portfolio" "/api/internal/portfolio/seed" "{\"userId\":\"${E2E_USER_ID}\"}"
          seed_endpoint "market-data" "/api/internal/market-data/seed" "{\"userId\":\"${E2E_USER_ID}\"}"

      - name: Run Azure Synthetic Monitoring
        working-directory: ./frontend
        env:
          # Canonical public frontend domain — same domain as AWS, post-DNS-cutover.
          BASE_URL: https://vibhanshu-ai-portfolio.dev
          # API gateway lives under the api. subdomain (see job-level API_BASE).
          NEXT_PUBLIC_API_BASE_URL: https://api.vibhanshu-ai-portfolio.dev
          # Skip the local-stack health poll — not appropriate for live Azure.
          SKIP_BACKEND_HEALTH_CHECK: "true"
          # Shared secret for internal seed endpoints.
          INTERNAL_API_KEY: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
          # E2E test user credentials (same seeded user across both cloud environments).
          E2E_TEST_USER_EMAIL: ${{ secrets.E2E_TEST_USER_EMAIL }}
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npx playwright test --project=azure-synthetic

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-azure
          path: frontend/playwright-report/
          retention-days: 7
