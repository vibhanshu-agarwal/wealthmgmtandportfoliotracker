name: Synthetic Monitoring

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Run hourly

jobs:
  run-synthetic-tests:
    name: Run AWS Synthetic Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Pre-warm AWS Lambda stack
        # Hit api-gateway → portfolio-service to trigger cold starts BEFORE seeding.
        # The combined cold-start chain (api-gateway ~10s + portfolio-service ~30s) exceeds
        # CloudFront's 60s origin timeout if seeding is the first request. Retrying up to 5
        # times with --max-time 65 ensures we wait long enough for the Lambda to boot.
        # Any non-5xx response means the Lambda is warm and ready.
        run: |
          echo "Pre-warming Lambda stack at https://vibhanshu-ai-portfolio.dev ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 65 \
              https://vibhanshu-ai-portfolio.dev/api/portfolio/health || echo "000")
            echo "  Attempt $i: HTTP $STATUS"
            if [ "$STATUS" != "504" ] && [ "$STATUS" != "502" ] && [ "$STATUS" != "000" ]; then
              echo "Lambda stack is warm (HTTP $STATUS). Proceeding."
              exit 0
            fi
            echo "  Cold start or timeout — waiting 5s before retry..."
            sleep 5
          done
          echo "Warning: Lambda pre-warm did not return a success response. Seeding may still succeed."

      - name: Run Synthetic Monitoring
        working-directory: ./frontend
        env:
          # Targets the live production site (CloudFront root domain)
          BASE_URL: https://vibhanshu-ai-portfolio.dev
          # Gateway base URL — API is served under /api/* on the same CloudFront distribution.
          # There is no separate api. subdomain; the backend routes through the root domain.
          GATEWAY_BASE_URL: https://vibhanshu-ai-portfolio.dev
          # Skip the local-stack health poll — not appropriate for live AWS:
          #   1. Lambda cold starts exceed the 5s AbortSignal in global-setup.
          #   2. /actuator/health is protected by Spring Security (returns 403 through CloudFront).
          # The synthetic tests themselves are the health signal for this environment.
          SKIP_BACKEND_HEALTH_CHECK: "true"
          # Shared secret for seeding
          INTERNAL_API_KEY: ${{ secrets.TF_VAR_INTERNAL_API_KEY }}
          # E2E test user credentials
          E2E_TEST_USER_EMAIL: e2e-test-user@vibhanshu-ai-portfolio.dev
          E2E_TEST_USER_PASSWORD: ${{ secrets.E2E_TEST_USER_PASSWORD }}
        run: npx playwright test --project=aws-synthetic

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
