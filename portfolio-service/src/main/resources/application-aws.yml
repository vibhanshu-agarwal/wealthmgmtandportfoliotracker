# ============================================================
# AWS profile — overrides for Lambda / AWS-specific deployment.
# Active when SPRING_PROFILES_ACTIVE includes "aws" (e.g. "prod,aws").
# Loaded after application-prod.yml; keys here win over prod.
#
# Future clouds: add application-azure.yml / application-gcp.yml
# with their own overrides. application-prod.yml stays untouched.
# ============================================================

fx:
  aws:
    # Open Exchange Rates — free-tier FX endpoint used on AWS.
    # Override in application-azure.yml with an Azure-equivalent if needed.
    rates-url: https://open.er-api.com/v6/latest/USD
    refresh-cron: "0 0 6 * * *"

spring:
  cache:
    # Caffeine (in-memory) for FX rates on Lambda — no ElastiCache dependency.
    # Override to redis if ElastiCache becomes available in a future phase.
    type: simple
