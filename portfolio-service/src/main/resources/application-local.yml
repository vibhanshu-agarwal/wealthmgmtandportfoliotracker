spring:
  kafka:
    consumer:
      # ErrorHandlingDeserializer wraps JsonDeserializer so that unparseable bytes are
      # captured as a DeserializationException header and routed to the DLT rather than
      # crashing the consumer. The programmatic ConsumerFactory in PortfolioKafkaConfig
      # also sets these properties, but declaring them here ensures the local profile
      # is self-documenting and consistent with the design spec (Requirement 5.1).
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.wealth.market.events"
