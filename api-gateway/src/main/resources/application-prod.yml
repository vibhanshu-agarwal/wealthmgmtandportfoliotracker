# ============================================================
# Production profile — cloud-agnostic.
# Active whenever SPRING_PROFILES_ACTIVE includes "prod".
# Loaded before any cloud-specific profile (aws, azure, gcp).
# Cloud profiles override individual keys here as needed.
# ============================================================

server:
  port: 8080

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_URI}

  data:
    redis:
      # REDIS_URL format: redis[s]://[:password@]host[:port]
      # Upstash requires rediss:// (TLS). Set via REDIS_URL env var / GitHub Actions secret.
      # If absent, Spring Boot falls back to localhost:6379 — ensure REDIS_URL is always set
      # in production environments to avoid startup hangs on connection attempts.
      url: ${REDIS_URL:redis://localhost:6379}

auth:
  jwk-uri: ${AUTH_JWK_URI}

app:
  cors:
    allowed-origin-patterns:
      - "https://vibhanshu-ai-portfolio.dev"
      - "https://*.vibhanshu-ai-portfolio.dev"
