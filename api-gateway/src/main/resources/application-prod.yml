# ============================================================
# Production profile — cloud-agnostic.
# Active whenever SPRING_PROFILES_ACTIVE includes "prod".
# Loaded before any cloud-specific profile (aws, azure, gcp).
# Cloud profiles override individual keys here as needed.
# ============================================================

server:
  port: 8080

spring:
  data:
    redis:
      # REDIS_URL format: redis[s]://[:password@]host[:port]
      # Upstash requires rediss:// (TLS). Set via REDIS_URL env var / GitHub Actions secret.
      # If absent, Spring Boot falls back to localhost:6379 — ensure REDIS_URL is always set
      # in production environments to avoid startup hangs on connection attempts.
      url: ${REDIS_URL:redis://localhost:6379}
      # SSL is configured programmatically via RedisSslConfig (LettuceClientConfigurationBuilderCustomizer).
      # Do NOT set spring.data.redis.ssl.bundle here — it requires an explicitly registered Spring Boot
      # SSL bundle name, not a file path. The RedisSslConfig bean reads REDIS_TRUSTSTORE_PATH directly
      # and configures Lettuce SslOptions from the extracted /tmp/kafka-truststore.jks file.

  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            # Fail fast on downstream Lambda connection (cold-start stall guard).
            # 5 s is generous — Function URL connects immediately; longer means the Lambda
            # itself has crashed before accepting TCP.
            connect-timeout: 5000
            # Hard budget for downstream response: 55 s keeps us under CloudFront's
            # 60 s origin-read timeout, so the client sees 504 (gateway timeout) rather
            # than a raw 502 socket reset when a downstream Lambda is slow or overloaded.
            response-timeout: 55s

app:
  cors:
    allowed-origin-patterns: "https://vibhanshu-ai-portfolio.dev,https://*.vibhanshu-ai-portfolio.dev"
