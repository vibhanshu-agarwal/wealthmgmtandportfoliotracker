spring:
  application:
    name: api-gateway
  # spring.data.redis.* intentionally absent — lives only in application-local.yml
  # No default-filters here — any RequestRateLimiter reference triggers Redis autoconfiguration
  # on startup, which crashes deployments where no Redis is present (e.g. AWS without ElastiCache)

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: portfolio-service
              uri: ${PORTFOLIO_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/portfolio/**
            - id: market-data-service
              uri: ${MARKET_DATA_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/market/**
            - id: insight-service
              uri: ${INSIGHT_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/insight/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"
