spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  # spring.data.redis.* intentionally absent — lives only in application-local.yml
  # No default-filters here — any RequestRateLimiter reference triggers Redis autoconfiguration
  # on startup, which crashes deployments where no Redis is present (e.g. AWS without ElastiCache)

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: portfolio-service
              uri: ${app.routes.portfolio-url}
              predicates:
                - Path=/api/portfolio/**
            - id: market-data-service
              uri: ${app.routes.market-data-url}
              predicates:
                - Path=/api/market/**
            - id: insight-service
              uri: ${app.routes.insight-url}
              predicates:
                - Path=/api/insights/**
            - id: insight-chat
              uri: ${app.routes.insight-url}
              predicates:
                - Path=/api/chat/**
            # Golden-State E2E seeder routes. The gateway is a dumb router for /api/internal/**:
            # no JWT, no origin-verify, no X-User-Id injection. Each downstream service
            # validates X-Internal-Api-Key itself (see InternalApiKeyFilter).
            - id: internal-portfolio-seed
              uri: ${app.routes.portfolio-url}
              predicates:
                - Path=/api/internal/portfolio/**
            - id: internal-market-data-seed
              uri: ${app.routes.market-data-url}
              predicates:
                - Path=/api/internal/market-data/**
            - id: internal-insight-seed
              uri: ${app.routes.insight-url}
              predicates:
                - Path=/api/internal/insight/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: "*"

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:}   # local/aws profiles — must be >= 32 bytes for HS256
  jwk-uri: ${AUTH_JWK_URI:}       # reserved for a future external-IdP profile; not active in current aws auth path

app:
  routes:
    # Single source of truth for downstream service URL defaults.
    # Each route above references ${app.routes.*-url} so a default-port change
    # requires editing exactly one line here instead of every route entry.
    portfolio-url: ${PORTFOLIO_SERVICE_URL:http://localhost:8081}
    market-data-url: ${MARKET_DATA_SERVICE_URL:http://localhost:8082}
    insight-url: ${INSIGHT_SERVICE_URL:http://localhost:8083}
  cors:
    allowed-origin-patterns: "http://localhost:3000,http://127.0.0.1:3000"
  auth:
    email: ${APP_AUTH_EMAIL:dev@localhost.local}
    password: ${APP_AUTH_PASSWORD:password}
    # Align with Flyway V3 seed (portfolios.user_id = user-001); override via APP_AUTH_USER_ID if needed.
    user-id: ${APP_AUTH_USER_ID:user-001}
    name: ${APP_AUTH_NAME:Development User}
