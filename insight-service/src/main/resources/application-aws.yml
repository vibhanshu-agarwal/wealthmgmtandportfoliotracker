# ============================================================
# AWS profile — overrides for Lambda / AWS-specific deployment.
# Active when SPRING_PROFILES_ACTIVE includes "aws" (e.g. "prod,aws,bedrock").
# Loaded after application-prod.yml; keys here win over prod.
#
# Future clouds: add application-azure.yml / application-gcp.yml
# with their own overrides. application-prod.yml stays untouched.
#
# Model + temperature live in application-bedrock.yml (single source of truth);
# this file only pins the region used by the Bedrock AWS SDK credential chain.
# ============================================================

spring:
  ai:
    bedrock:
      aws:
        # Bedrock is available in us-east-1; Lambda runs in ap-south-1.
        # Cross-region Bedrock calls are supported — no VPC or NAT gateway required.
        # No API key needed: the Lambda execution role's IAM credentials are picked up
        # automatically by the AWS SDK default credential chain.
        region: us-east-1
