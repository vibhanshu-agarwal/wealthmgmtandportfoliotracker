# ============================================================
# Bedrock profile — AI adapter configuration for AWS Bedrock.
# Active when SPRING_PROFILES_ACTIVE includes "bedrock" (e.g. "prod,aws,bedrock" on Lambda,
# or "local,bedrock" for opt-in local smoke-testing against real Bedrock).
#
# Model: Claude Haiku 4.5 via the US cross-region inference profile
# ("us." prefix denotes a system-defined inference profile — the only supported
# invocation path for Haiku 4.5 on-demand on Bedrock; direct foundation-model IDs
# return ValidationException for this family).
#
# The `spring.ai.bedrock.converse.*` path is authoritative — the service uses the
# spring-ai-starter-model-bedrock-converse starter, which binds from that prefix.
# Writing to `spring.ai.bedrock.chat.*` (without the `converse` segment) is silently
# ignored by the starter.
# ============================================================

spring:
  ai:
    bedrock:
      aws:
        region: ${AWS_REGION:us-east-1}
        access-key: ${AWS_ACCESS_KEY_ID:}
        secret-key: ${AWS_SECRET_ACCESS_KEY:}
      converse:
        chat:
          options:
            model: us.anthropic.claude-haiku-4-5-20251001-v1:0
            temperature: 0.2
