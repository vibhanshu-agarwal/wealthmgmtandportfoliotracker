spring:
  application:
    name: insight-service
  profiles:
    # The "local" fallback is intentional — it activates application-local.yml for Docker Compose.
    # On Lambda, SPRING_PROFILES_ACTIVE is set to "prod,aws,bedrock" by Terraform, overriding this default.
    # Spring Boot will also include "local" in the active profiles list (visible in logs) — this is
    # expected behavior from the base application.yml default, not a misconfiguration.
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      # Use REDIS_URL for consistency with api-gateway and portfolio-service.
      # Format: redis[s]://[:password@]host[:port]  (Upstash requires rediss:// for TLS)
      # On Lambda, REDIS_URL is injected by Terraform from GitHub Actions secrets.
      url: ${REDIS_URL:redis://localhost:6379}
  cache:
    # local/CI: in-memory cache (no Redis required).
    # Overridden to "redis" in application-prod.yml for production deployments.
    type: simple
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: insight-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.value.default.type: com.wealth.market.events.PriceUpdatedEvent
        spring.json.trusted.packages: "*"
  web:
    error:
      include-message: always
      include-exception: true

server:
  port: 8083

insight:
  portfolio-service:
    base-url: ${PORTFOLIO_SERVICE_URL:http://localhost:8081}

logging:
  level:
    org.springframework.kafka: INFO
