# ============================================================
# azure-ai profile — AI adapter configuration for Azure OpenAI.
# Active when SPRING_PROFILES_ACTIVE includes "azure-ai"
# (e.g. "prod,azure,azure-ai" on Azure Container Apps).
#
# Authentication: Managed Identity / Entra ID via Spring AI native
# spring.ai.openai.* wiring (DefaultAzureCredential through azure-identity).
# On Azure Container Apps the Container App's System-Assigned Managed Identity
# is granted the "Cognitive Services OpenAI User" role on the Azure OpenAI
# resource by Terraform (task 11.5), so no API key is required at runtime.
#
# To switch to API-key auth (e.g. for local smoke-testing):
#   1. Set OPENAI_API_KEY (or AZURE_OPENAI_API_KEY) in the environment.
#   2. Uncomment the `api-key` line below.
#   Note: NEVER commit a real key; use a secrets manager or .env.secrets.
#
# Env-var contract (must align 1:1 with Terraform task 11.4):
#   AZURE_OPENAI_ENDPOINT   — the Azure OpenAI resource endpoint URL
#   AZURE_OPENAI_DEPLOYMENT — the deployment name (defaults to gpt-4o-mini)
# ============================================================

spring:
  ai:
    model:
      chat: openai
    openai:
      base-url: ${AZURE_OPENAI_ENDPOINT}
      # Overrides application.yml placeholder-key; empty unless OPENAI_API_KEY is set for smoke tests.
      api-key: ${OPENAI_API_KEY:}
      # api-key: ${AZURE_OPENAI_API_KEY}   # Uncomment to use API-key auth instead of Managed Identity
      chat:
        options:
          model: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o-mini}
          temperature: 0.7
          # Resolution JSON is compact; 500 tokens is generous while preventing runaway usage (Req 8.4).
          max-tokens: 500
