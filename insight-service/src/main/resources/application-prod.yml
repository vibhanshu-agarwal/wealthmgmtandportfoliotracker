# ============================================================
# Production profile — cloud-agnostic.
# Active whenever SPRING_PROFILES_ACTIVE includes "prod".
# Loaded before any cloud-specific profile (aws, azure, gcp).
# Cloud profiles override individual keys here as needed.
# ============================================================

server:
  port: 8080

spring:
  config:
    import: "classpath:config/application-prod-kafka.yml"

  data:
    redis:
      # REDIS_URL format: redis[s]://[:password@]host[:port]
      url: ${REDIS_URL:redis://localhost:6379}
      trust-store-location: ${REDIS_TRUSTSTORE_PATH:}
      trust-store-password: ${REDIS_TRUSTSTORE_PASSWORD:changeit}

  cache:
    # Redis-backed cache for Bedrock responses.
    # TTLs are configured programmatically in CacheConfig.java:
    #   sentiment cache: 60 minutes (market sentiment doesn't change minute-to-minute)
    #   portfolio-analysis cache: 30 minutes
    # Cache errors (Redis unavailable) fall through to Bedrock — non-fatal.
    type: redis
