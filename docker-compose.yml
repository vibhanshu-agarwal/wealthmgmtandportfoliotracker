services:
  postgres:
    image: 'postgres:16'
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: wealth_user
      POSTGRES_PASSWORD: wealth_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mongodb:
    image: 'mongo:7.0'
    container_name: market-db
    environment:
      MONGO_INITDB_DATABASE: market_db
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data/db

  kafka:
    image: 'confluentinc/cp-kafka:7.6.0'
    container_name: event-broker
    ports:
      - '9092:9092'
      - '9094:9094'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: 'NjY0NmE0NjY0NmE0NjY0Ng=='
    volumes:
      - kafka-data:/var/lib/kafka/data

  redis:
    image: 'redis:alpine'
    container_name: gateway-cache
    ports:
      - '6379:6379'

  portfolio-service:
    build:
      context: ./portfolio-service
    container_name: portfolio-service
    depends_on:
      - postgres
      - kafka
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio_db?options=-c%20timezone=Asia/Kolkata
      SPRING_DATASOURCE_USERNAME: wealth_user
      SPRING_DATASOURCE_PASSWORD: wealth_pass
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - '8081:8081'

  market-data-service:
    build:
      context: ./market-data-service
    container_name: market-data-service
    depends_on:
      - mongodb
      - kafka
    environment:
      SPRING_MONGODB_URI: mongodb://mongodb:27017/market_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - '8082:8082'

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    depends_on:
      - redis
      - portfolio-service
      - market-data-service
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      PORTFOLIO_SERVICE_URL: http://portfolio-service:8081
      MARKET_DATA_SERVICE_URL: http://market-data-service:8082
    ports:
      - '8080:8080'

volumes:
  postgres-data:
  mongodb-data:
  kafka-data:
